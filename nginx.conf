
user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;  
    keepalive_timeout  65;

    server {
        gzip on;
        gzip_types text/plain image/svg+xml text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
        gzip_proxied no-cache no-store private expired auth;
        gzip_min_length 1000; # or a smaller value like 256 if desired
        gzip_comp_level    9;

        listen       80;
        server_name  localhost;
        root   /usr/share/nginx/html;

        location / {
            add_header X-debug-whats-going-on 1;
            index do-not-use-me.html;
            try_files $uri @index;                 
        }

        location @index {
            add_header X-debug-whats-going-on 2;
            add_header Cache-Control no-cache;
            expires 0;
            try_files $uri/index.html =404;
        }
    }
}
